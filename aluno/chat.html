<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIBIEX 2026 · Chat da Turma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="flex min-h-screen">

    <div id="sidebar-container"></div>

    <div class="flex-1 min-w-0 flex flex-col">
        <div id="topo-pagina"></div>

        <main class="flex-1 flex flex-col p-9 max-w-3xl mx-auto w-full min-h-0">
            <h1 class="fonte-display text-2xl font-semibold mb-1" style="color: var(--pibiex-texto);">Chat da Turma</h1>
            <p class="text-sm mb-5" style="color: var(--pibiex-texto-suave);">Tire dúvidas, compartilhe prompts e converse com a turma.</p>

            <div id="lista-mensagens" class="flex-1 min-h-0 overflow-y-auto space-y-3 bg-white rounded-lg border p-4 mb-4" style="border-color: var(--pibiex-borda);">
                <p class="text-sm" style="color: var(--pibiex-texto-suave);">Carregando...</p>
            </div>

            <form id="form-chat" class="flex gap-2">
                <input id="input-mensagem" type="text" placeholder="Escreva uma mensagem..."
                       class="flex-1 border rounded-full px-4 py-2.5 text-sm outline-none" style="border-color: var(--pibiex-borda);">
                <button type="submit" class="text-white rounded-full px-5 py-2.5 text-sm font-semibold" style="background: var(--pibiex-tinta);">Enviar</button>
            </form>
        </main>
    </div>

    <div id="assistente-flutuante"></div>

    <script src="shell.js"></script>
    <script>
        let TOKEN_ALUNO = null;

        function formatarHora(dataIso) {
            return new Date(dataIso).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function renderizarMensagens(mensagens) {
            const container = document.getElementById('lista-mensagens');

            if (!mensagens || mensagens.length === 0) {
                container.innerHTML = `<p class="text-sm" style="color: var(--pibiex-texto-suave);">Nenhuma mensagem ainda. Seja o primeiro a escrever!</p>`;
                return;
            }

            container.innerHTML = mensagens.map(m => {
                const deEquipe = m.autor_tipo === 'equipe';
                const alinhamento = m.souEu ? 'ml-auto' : '';
                const cor = m.souEu
                    ? 'background: var(--pibiex-tinta); color: white;'
                    : deEquipe
                        ? 'background: #FBF3DC; color: var(--pibiex-texto);'
                        : 'background: var(--pibiex-papel); color: var(--pibiex-texto);';

                return `
                    <div class="max-w-[75%] w-fit ${alinhamento}">
                        <p class="text-[10px] font-bold uppercase tracking-wide mb-0.5 px-1" style="color: var(--pibiex-texto-suave);">
                            ${m.autorNome || (deEquipe ? 'Equipe' : 'Aluno')} · ${formatarHora(m.criado_em)}
                        </p>
                        <div class="rounded-lg px-3.5 py-2 text-sm" style="${cor}">${m.mensagem}</div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function carregarMensagens() {
            const { data, error } = await window.supabaseClient.functions.invoke('chat-turma', {
                body: { token: TOKEN_ALUNO, acao: 'listar' },
            });
            if (error || !data || data.erro) {
                document.getElementById('lista-mensagens').innerHTML =
                    `<p class="text-sm text-red-600">Não foi possível carregar o chat.</p>`;
                return;
            }
            renderizarMensagens(data.mensagens);
        }

        document.getElementById('form-chat').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('input-mensagem');
            const mensagem = input.value.trim();
            if (!mensagem) return;

            input.value = '';
            const { data, error } = await window.supabaseClient.functions.invoke('chat-turma', {
                body: { token: TOKEN_ALUNO, acao: 'enviar', mensagem },
            });

            if (error || !data || data.erro) {
                alert((data && data.erro) || 'Erro ao enviar mensagem.');
                return;
            }
            await carregarMensagens();
        });

        iniciarShellAluno('chat').then((dados) => {
            if (!dados) return;
            TOKEN_ALUNO = localStorage.getItem('pibiex_aluno_token');
            carregarMensagens();
            setInterval(carregarMensagens, 8000); // atualiza sozinho a cada 8s
        });
    </script>
</body>
</html>
