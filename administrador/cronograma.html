<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIBIEX 2026 · Gerenciar Cronograma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="flex min-h-screen bg-gray-50">

    <div id="sidebar-container"></div>

    <div class="flex-1 min-w-0">
        <div id="topo-pagina"></div>

        <main class="p-8 max-w-4xl mx-auto">
            <h1 class="text-2xl font-black text-gray-800 mb-1">📅 Gerenciar Cronograma</h1>
            <p class="text-gray-500 mb-6">Crie módulos e aulas. Isso aparece automaticamente na área do aluno.</p>

            <!-- Formulário: novo módulo -->
            <form id="form-novo-modulo" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-8 flex flex-wrap gap-3 items-end">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-xs font-bold text-gray-500 mb-1">Título do módulo</label>
                    <input id="novo-modulo-titulo" required class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                </div>
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-xs font-bold text-gray-500 mb-1">Descrição (opcional)</label>
                    <input id="novo-modulo-descricao" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                </div>
                <div class="w-24">
                    <label class="block text-xs font-bold text-gray-500 mb-1">Ordem</label>
                    <input id="novo-modulo-ordem" type="number" value="0" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                </div>
                <button type="submit" class="bg-gray-900 hover:bg-gray-800 text-white font-bold px-5 py-2 rounded-lg text-sm">+ Novo módulo</button>
            </form>

            <div id="lista-modulos" class="space-y-6">
                <p class="text-gray-400 text-sm">Carregando...</p>
            </div>
        </main>
    </div>

    <script src="shell.js"></script>
    <script>
        let TOKEN_EQUIPE = null;
        let TURMA_ATUAL = null;
        let idEmEdicao = null; // { tipo: 'modulo'|'aula', id }

        function formatarData(dataIso) {
            return dataIso ? dataIso.split('-').reverse().join('/') : '';
        }

        async function chamarGerenciarCronograma(acao, dados) {
            const { data, error } = await window.supabaseClient.functions.invoke('gerenciar-cronograma', {
                body: { tokenEquipe: TOKEN_EQUIPE, acao, ...dados },
            });
            if (error || !data || data.erro) {
                alert((data && data.erro) ? data.erro : 'Erro ao salvar. Tente novamente.');
                return null;
            }
            return data;
        }

        // ---------- Carregar e renderizar ----------
        async function carregarModulos() {
            const { data: modulos, error } = await window.supabaseClient
                .from('modulos')
                .select('id, titulo, descricao, ordem, aulas(id, titulo, data_aula, horario_inicio, horario_fim, ordem)')
                .eq('turma_id', TURMA_ATUAL)
                .order('ordem', { ascending: true });

            if (error) {
                document.getElementById('lista-modulos').innerHTML = '<p class="text-red-500 text-sm">Erro ao carregar módulos.</p>';
                console.error(error);
                return;
            }

            (modulos || []).forEach(m => (m.aulas || []).sort((a, b) => a.ordem - b.ordem));
            renderizarModulos(modulos || []);
        }

        function renderizarModulos(modulos) {
            const container = document.getElementById('lista-modulos');

            if (modulos.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-sm bg-white rounded-xl p-6 border border-gray-100">Nenhum módulo ainda. Crie o primeiro acima.</p>';
                return;
            }

            container.innerHTML = modulos.map((modulo) => {
                const editandoModulo = idEmEdicao && idEmEdicao.tipo === 'modulo' && idEmEdicao.id === modulo.id;

                const cabecalho = editandoModulo ? `
                    <div class="p-4 space-y-2 bg-gray-50">
                        <input id="edit-modulo-titulo-${modulo.id}" value="${modulo.titulo}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-bold">
                        <input id="edit-modulo-descricao-${modulo.id}" value="${modulo.descricao || ''}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        <div class="flex gap-2">
                            <input id="edit-modulo-ordem-${modulo.id}" type="number" value="${modulo.ordem}" class="w-20 border border-gray-200 rounded-lg px-3 py-2 text-sm">
                            <button onclick="salvarModulo('${modulo.id}')" class="bg-green-600 text-white text-xs font-bold px-3 py-2 rounded-lg">Salvar</button>
                            <button onclick="cancelarEdicao()" class="bg-gray-200 text-gray-700 text-xs font-bold px-3 py-2 rounded-lg">Cancelar</button>
                        </div>
                    </div>
                ` : `
                    <div class="px-5 py-4 bg-gray-900 flex justify-between items-start">
                        <div>
                            <p class="text-white font-black">${modulo.titulo}</p>
                            ${modulo.descricao ? `<p class="text-gray-300 text-xs mt-0.5">${modulo.descricao}</p>` : ''}
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <button onclick="editarModulo('${modulo.id}')" class="text-gray-300 hover:text-white text-xs">✏️</button>
                            <button onclick="excluirModulo('${modulo.id}')" class="text-gray-300 hover:text-red-400 text-xs">🗑️</button>
                        </div>
                    </div>
                `;

                const aulasHtml = (modulo.aulas || []).map((aula) => {
                    const editandoAula = idEmEdicao && idEmEdicao.tipo === 'aula' && idEmEdicao.id === aula.id;

                    if (editandoAula) {
                        return `
                            <div class="px-5 py-3 border-t border-gray-100 bg-gray-50 space-y-2">
                                <input id="edit-aula-titulo-${aula.id}" value="${aula.titulo}" class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm">
                                <div class="flex gap-2 flex-wrap">
                                    <input id="edit-aula-data-${aula.id}" type="date" value="${aula.data_aula || ''}" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm">
                                    <input id="edit-aula-inicio-${aula.id}" type="time" value="${(aula.horario_inicio || '').slice(0,5)}" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm">
                                    <input id="edit-aula-fim-${aula.id}" type="time" value="${(aula.horario_fim || '').slice(0,5)}" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm">
                                    <input id="edit-aula-ordem-${aula.id}" type="number" value="${aula.ordem}" class="w-16 border border-gray-200 rounded-lg px-3 py-1.5 text-sm">
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="salvarAula('${aula.id}', '${modulo.id}')" class="bg-green-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg">Salvar</button>
                                    <button onclick="cancelarEdicao()" class="bg-gray-200 text-gray-700 text-xs font-bold px-3 py-1.5 rounded-lg">Cancelar</button>
                                </div>
                            </div>
                        `;
                    }

                    return `
                        <div class="px-5 py-3 border-t border-gray-100 flex items-center justify-between gap-3">
                            <div class="flex items-center gap-4">
                                <div class="bg-blue-50 text-blue-700 font-black rounded-lg px-3 py-1.5 text-center shrink-0 text-xs w-24">
                                    ${formatarData(aula.data_aula) || 'Sem data'}
                                </div>
                                <div>
                                    <p class="font-bold text-gray-800 text-sm">${aula.titulo}</p>
                                    ${aula.horario_inicio ? `<p class="text-gray-500 text-xs">${aula.horario_inicio.slice(0,5)}${aula.horario_fim ? ' às ' + aula.horario_fim.slice(0,5) : ''}</p>` : ''}
                                </div>
                            </div>
                            <div class="flex gap-2 shrink-0">
                                <button onclick="editarAula('${aula.id}')" class="text-gray-400 hover:text-gray-700 text-xs">✏️</button>
                                <button onclick="excluirAula('${aula.id}', '${modulo.id}')" class="text-gray-400 hover:text-red-600 text-xs">🗑️</button>
                            </div>
                        </div>
                    `;
                }).join('');

                const formNovaAula = `
                    <form onsubmit="return criarAula(event, '${modulo.id}')" class="px-5 py-3 border-t border-gray-100 bg-gray-50 flex flex-wrap gap-2 items-end">
                        <input required placeholder="Título da aula" id="nova-aula-titulo-${modulo.id}" class="flex-1 min-w-[140px] border border-gray-200 rounded-lg px-3 py-1.5 text-sm">
                        <input type="date" id="nova-aula-data-${modulo.id}" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm">
                        <input type="time" id="nova-aula-inicio-${modulo.id}" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm">
                        <input type="time" id="nova-aula-fim-${modulo.id}" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm">
                        <button type="submit" class="bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg">+ Aula</button>
                    </form>
                `;

                return `
                    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                        ${cabecalho}
                        ${aulasHtml || '<p class="text-gray-400 text-sm px-5 py-4">Nenhuma aula neste módulo ainda.</p>'}
                        ${formNovaAula}
                    </div>
                `;
            }).join('');
        }

        // ---------- Módulos: criar / editar / excluir ----------
        document.getElementById('form-novo-modulo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const titulo = document.getElementById('novo-modulo-titulo').value.trim();
            const descricao = document.getElementById('novo-modulo-descricao').value.trim();
            const ordem = parseInt(document.getElementById('novo-modulo-ordem').value || '0', 10);
            if (!titulo) return;

            const resultado = await chamarGerenciarCronograma('criar_modulo', { turmaId: TURMA_ATUAL, titulo, descricao, ordem });
            if (resultado) {
                document.getElementById('form-novo-modulo').reset();
                document.getElementById('novo-modulo-ordem').value = '0';
                carregarModulos();
            }
        });

        window.editarModulo = (moduloId) => { idEmEdicao = { tipo: 'modulo', id: moduloId }; carregarModulos(); };
        window.cancelarEdicao = () => { idEmEdicao = null; carregarModulos(); };

        window.salvarModulo = async (moduloId) => {
            const titulo = document.getElementById(`edit-modulo-titulo-${moduloId}`).value.trim();
            const descricao = document.getElementById(`edit-modulo-descricao-${moduloId}`).value.trim();
            const ordem = parseInt(document.getElementById(`edit-modulo-ordem-${moduloId}`).value || '0', 10);
            if (!titulo) return;

            const resultado = await chamarGerenciarCronograma('atualizar_modulo', { moduloId, titulo, descricao, ordem });
            if (resultado) { idEmEdicao = null; carregarModulos(); }
        };

        window.excluirModulo = async (moduloId) => {
            if (!confirm('Excluir este módulo e todas as suas aulas? Essa ação não pode ser desfeita.')) return;
            const resultado = await chamarGerenciarCronograma('excluir_modulo', { moduloId });
            if (resultado) carregarModulos();
        };

        // ---------- Aulas: criar / editar / excluir ----------
        window.criarAula = async (event, moduloId) => {
            event.preventDefault();
            const titulo = document.getElementById(`nova-aula-titulo-${moduloId}`).value.trim();
            const dataAula = document.getElementById(`nova-aula-data-${moduloId}`).value || null;
            const horarioInicio = document.getElementById(`nova-aula-inicio-${moduloId}`).value || null;
            const horarioFim = document.getElementById(`nova-aula-fim-${moduloId}`).value || null;
            if (!titulo) return false;

            const resultado = await chamarGerenciarCronograma('criar_aula', { moduloId, titulo, dataAula, horarioInicio, horarioFim });
            if (resultado) carregarModulos();
            return false;
        };

        window.editarAula = (aulaId) => { idEmEdicao = { tipo: 'aula', id: aulaId }; carregarModulos(); };

        window.salvarAula = async (aulaId) => {
            const titulo = document.getElementById(`edit-aula-titulo-${aulaId}`).value.trim();
            const dataAula = document.getElementById(`edit-aula-data-${aulaId}`).value || null;
            const horarioInicio = document.getElementById(`edit-aula-inicio-${aulaId}`).value || null;
            const horarioFim = document.getElementById(`edit-aula-fim-${aulaId}`).value || null;
            const ordem = parseInt(document.getElementById(`edit-aula-ordem-${aulaId}`).value || '0', 10);
            if (!titulo) return;

            const resultado = await chamarGerenciarCronograma('atualizar_aula', { aulaId, titulo, dataAula, horarioInicio, horarioFim, ordem });
            if (resultado) { idEmEdicao = null; carregarModulos(); }
        };

        window.excluirAula = async (aulaId) => {
            if (!confirm('Excluir esta aula?')) return;
            const resultado = await chamarGerenciarCronograma('excluir_aula', { aulaId });
            if (resultado) carregarModulos();
        };

        // ---------- Início ----------
        iniciarShellEquipe('cronograma').then(async (sessao) => {
            if (!sessao) return;
            TOKEN_EQUIPE = sessao.token;

            const { data: turmas } = await window.supabaseClient.from('turmas').select('id, nome').order('ano', { ascending: false }).limit(1);
            TURMA_ATUAL = turmas && turmas[0] ? turmas[0].id : null;

            if (!TURMA_ATUAL) {
                document.getElementById('lista-modulos').innerHTML = '<p class="text-red-500 text-sm">Nenhuma turma cadastrada ainda.</p>';
                return;
            }

            carregarModulos();
        });
    </script>
</body>
</html>
