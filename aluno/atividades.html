<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIBIEX 2026 Â· Atividades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="flex min-h-screen">

    <div id="sidebar-container"></div>

    <div class="flex-1 min-w-0">
        <div id="topo-pagina"></div>

        <main class="p-9 max-w-4xl mx-auto">
            <h1 class="fonte-display text-2xl font-semibold mb-1" style="color: var(--pibiex-texto);">Atividades</h1>
            <p class="text-sm mb-7" style="color: var(--pibiex-texto-suave);">
                Prazos e enunciados de cada atividade do curso. Para enviar seu trabalho, use a pÃ¡gina
                <a href="trabalhos.html" class="underline font-semibold" style="color: var(--pibiex-tinta);">Meus Trabalhos</a>.
            </p>

            <div id="lista-atividades" class="space-y-4">
                <p class="text-sm" style="color: var(--pibiex-texto-suave);">Carregando...</p>
            </div>
        </main>
    </div>

    <div id="assistente-flutuante"></div>

    <script src="shell.js"></script>
    <script>
        function formatarPrazo(dataIso) {
            if (!dataIso) return null;
            const data = new Date(dataIso);
            return data.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function renderizarAtividades(atividades) {
            const container = document.getElementById('lista-atividades');

            if (!atividades || atividades.length === 0) {
                container.innerHTML = `<p class="text-sm bg-white rounded-lg p-5 border" style="color: var(--pibiex-texto-suave); border-color: var(--pibiex-borda);">Nenhuma atividade publicada ainda.</p>`;
                return;
            }

            container.innerHTML = atividades.map((atv) => {
                const prazo = formatarPrazo(atv.data_entrega);
                return `
                    <div class="bg-white rounded-lg p-5 border" style="border-color: var(--pibiex-borda);">
                        <div class="flex items-start justify-between gap-4">
                            <div>
                                <p class="font-semibold text-[15px]" style="color: var(--pibiex-texto);">${atv.titulo}</p>
                                ${atv.modulos ? `<p class="text-xs mt-0.5" style="color: var(--pibiex-texto-suave);">${atv.modulos.titulo}</p>` : ''}
                            </div>
                            ${prazo ? `<span class="text-xs font-semibold px-2.5 py-1 rounded-full shrink-0" style="background: var(--pibiex-papel); color: var(--pibiex-tinta);">Prazo: ${prazo}</span>` : ''}
                        </div>
                        ${atv.descricao ? `<p class="text-sm mt-3" style="color: var(--pibiex-texto-suave);">${atv.descricao}</p>` : ''}
                    </div>
                `;
            }).join('');
        }

        async function carregarAtividades(dadosAluno) {
            const { data, error } = await window.supabaseClient
                .from('atividades')
                .select('id, titulo, descricao, data_entrega, modulos(titulo, turma_id)')
                .order('data_entrega', { ascending: true });

            if (error) {
                document.getElementById('lista-atividades').innerHTML =
                    `<p class="text-sm text-red-600 bg-white rounded-lg p-5 border border-red-100">NÃ£o foi possÃ­vel carregar as atividades.</p>`;
                console.error(error);
                return;
            }

            const daTurma = (data || []).filter(a => a.modulos && a.modulos.turma_id === dadosAluno.turmaId);
            renderizarAtividades(daTurma);
        }

        iniciarShellAluno('atividades').then((dados) => {
            if (dados) carregarAtividades(dados);
        });
    </script>
</body>
</html>
