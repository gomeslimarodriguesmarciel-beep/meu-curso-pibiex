<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIBIEX 2026 · Criar nova senha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .btn-desabilitado { opacity: .5; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center px-4 py-12">

    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
        <div class="bg-blue-600 text-white text-center py-8 px-6">
            <h2 class="text-2xl font-extrabold tracking-wide">Crie sua senha definitiva</h2>
            <p class="text-blue-100 text-sm mt-2">Este é seu primeiro acesso (ou você acabou de recuperar sua senha). Por segurança, defina uma senha só sua.</p>
        </div>

        <div class="p-8 md:p-10">
            <div id="msg-erro" class="hidden bg-red-50 text-red-600 font-bold p-4 mb-6 text-sm text-center rounded-lg border border-red-200"></div>

            <form id="form-trocar-senha" class="space-y-5">
                <div>
                    <label class="block text-gray-700 font-bold text-sm mb-2 uppercase tracking-wide">Senha provisória (recebida por e-mail)</label>
                    <input type="text" id="senha-atual" required inputmode="numeric"
                           class="w-full bg-blue-50/50 border border-blue-100 rounded-xl p-4 text-gray-800 font-semibold focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-gray-700 font-bold text-sm mb-2 uppercase tracking-wide">Nova senha</label>
                    <input type="password" id="nova-senha" required
                           class="w-full bg-blue-50/50 border border-blue-100 rounded-xl p-4 text-gray-800 font-semibold focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    <p class="text-xs text-gray-400 mt-1 ml-1">Mínimo 5 caracteres, com pelo menos 1 letra maiúscula.</p>
                </div>

                <div>
                    <label class="block text-gray-700 font-bold text-sm mb-2 uppercase tracking-wide">Confirmar nova senha</label>
                    <input type="password" id="confirmar-senha" required
                           class="w-full bg-blue-50/50 border border-blue-100 rounded-xl p-4 text-gray-800 font-semibold focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>

                <button type="submit" id="btn-salvar" class="w-full bg-blue-600 text-white font-extrabold py-3 px-8 rounded-full hover:bg-blue-700 transition shadow-lg text-lg">
                    Salvar nova senha
                </button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gclcsgqvunutbvpazgsg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjbGNzZ3F2dW51dGJ2cGF6Z3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1Njc5MTQsImV4cCI6MjEwMDE0MzkxNH0.T87bJPVYiYO9vyJtaB6_n9CREO6fmNGumGK0phtaYk';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Sem sessão de aluno? Volta pro login.
        const tokenAluno = localStorage.getItem('pibiex_aluno_token');
        if (!tokenAluno) {
            window.location.href = 'index.html';
        }

        async function extrairMensagemErro(error, data, mensagemPadrao) {
            if (data && data.erro) return data.erro;
            if (error && error.context) {
                try {
                    const corpo = await error.context.json();
                    if (corpo && corpo.erro) return corpo.erro;
                } catch (e) { /* corpo não era JSON, usa a mensagem padrão */ }
            }
            return mensagemPadrao;
        }

        document.getElementById('form-trocar-senha').addEventListener('submit', async (e) => {
            e.preventDefault();
            const erroBox = document.getElementById('msg-erro');
            erroBox.classList.add('hidden');

            const senhaAtual = document.getElementById('senha-atual').value.trim();
            const novaSenha = document.getElementById('nova-senha').value;
            const confirmarNovaSenha = document.getElementById('confirmar-senha').value;

            if (novaSenha !== confirmarNovaSenha) {
                erroBox.innerText = 'A nova senha e a confirmação não são iguais.';
                erroBox.classList.remove('hidden');
                return;
            }
            if (novaSenha.length < 5 || !/[A-Z]/.test(novaSenha)) {
                erroBox.innerText = 'A nova senha precisa ter no mínimo 5 caracteres e pelo menos 1 letra maiúscula.';
                erroBox.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('btn-salvar');
            btn.innerText = 'Salvando...';
            btn.classList.add('btn-desabilitado');

            const { data, error } = await supabaseClient.functions.invoke('trocar-senha-aluno', {
                body: { token: tokenAluno, senhaAtual, novaSenha, confirmarNovaSenha },
            });

            if (error || !data || data.erro) {
                erroBox.innerText = await extrairMensagemErro(error, data, 'Erro ao salvar. Tente novamente.');
                erroBox.classList.remove('hidden');
                btn.innerText = 'Salvar nova senha';
                btn.classList.remove('btn-desabilitado');
                return;
            }

            // Atualiza o dado local (não precisa mais trocar a senha)
            const dados = JSON.parse(localStorage.getItem('pibiex_aluno_dados') || '{}');
            dados.precisaTrocarSenha = false;
            localStorage.setItem('pibiex_aluno_dados', JSON.stringify(dados));

            window.location.href = 'inicio.html';
        });
    </script>
</body>
</html>
